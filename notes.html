<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Poznámky trenéra</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="manifest" href="/mladez-kp-app/manifest.json">
<link rel="apple-touch-icon" href="/mladez-kp-app/icons/icon-192.png">

<meta name="theme-color" content="#2e7d32">

<style>
body {
  font-family: Arial, sans-serif;
  padding: 10px;
  background: #f2f2f2;
}

h2 {
  text-align: center;
}

/* INFO BOX */
.notes-info{
  background:#fff;
  padding:10px;
  border-radius:6px;
  margin-bottom:10px;
  font-size:14px;
  line-height:1.4;
}

textarea {
  width: 100%;
  min-height: 100px;
  font-size: 16px;
  padding: 8px;
}

input, button {
  padding: 8px;
  font-size: 16px;
  margin: 4px 0;
}

.note {
  background: #fff;
  padding: 8px;
  margin-bottom: 8px;
  border-radius: 6px;
}
</style>
</head>

<body>

<h2>📝 Poznámky trenéra</h2>

<!-- 🔥 NOVĚ PŘIDANÝ POPIS -->
<div class="notes-info">
  <strong>📋 Jak používat poznámky:</strong><br>
  Poznámky můžeš kdykoliv upravovat a doplňovat.<br>
  Uložený text není finální – můžeš ho znovu otevřít, přepsat nebo rozšířit o další informace.
</div>

<input id="noteTitle" placeholder="Název poznámky">

<textarea id="noteText" placeholder="Text poznámky (můžeš ji později upravit nebo doplnit)"></textarea>

<button id="saveNoteBtn">💾 Uložit poznámku</button>

<hr>

<div id="notesList"></div>

<script src="js/notes.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
